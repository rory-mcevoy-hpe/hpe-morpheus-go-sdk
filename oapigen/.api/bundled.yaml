  /api/instances:
    get:
      summary: Get All Instances
      description: |
        This endpoint retrieves a paginated list of instances.
      operationId: listInstances
      tags:
        - Instances
      parameters:
        - name: max
          in: query
          description: Maximum number of records to return
          schema: *ref_5
        - name: offset
          in: query
          description: Offset records, the number of records to skip, for paginating requests
          schema: *ref_6
        - name: name
          in: query
          description: Filter by name
          schema: *ref_10
          example: example
        - name: phrase
          in: query
          description: Search phrase for partial matches on name or description
          schema: *ref_9
        - name: zoneId
          in: query
          description: The Cloud ID (Zone ID) for Filtering
          schema: &ref_64
            type: integer
            format: int64
          example: 3
        - name: siteId
          in: query
          description: The Group ID (Site ID) for Filtering
          schema: &ref_121
            type: integer
            format: int64
          example: 7
        - name: planId
          in: query
          description: The Plan ID for Filtering
          schema: &ref_184
            type: integer
            format: int64
          example: 1
        - name: instanceType
          in: query
          description: The Instance Type Code for Filtering
          schema: &ref_185
            type: string
            description: Instance Type
          example: ubuntu
        - name: lastUpdated
          in: query
          description: Date filter, restricts query to only load resources updated more recently than the date specified (ISO 8601)
          example: '2019-03-06T17:52:29+00:00'
          schema: *ref_42
        - name: createdBy
          in: query
          description: The User ID for Filtering
          schema: &ref_122
            type: integer
            format: int64
            description: User ID
          example: 63
        - name: agentInstalled
          in: query
          description: Filter instances by if agent is installed or not on the associated servers.
          schema: &ref_186
            type: boolean
            description: Agent installed status
          example: true
        - name: status
          in: query
          description: The instance status for filtering.
          schema: &ref_187
            type: string
            description: Instance status
          example: running
        - name: environment
          in: query
          description: The environment for filtering.
          schema: &ref_188
            type: string
            description: Environment
          example: lab
        - name: showDeleted
          in: query
          description: If true, includes instances in pending removal status.
          schema: &ref_189
            type: boolean
            description: Show instances in pending removal status
            default: false
          example: true
        - name: deleted
          in: query
          description: If true, only deleted resources or instances in pending removal status are returned.
          schema: &ref_190
            type: boolean
            description: Show only deleted resources or instances in pending removal status
          example: true
        - name: expireDate
          in: query
          description: Filter by expireDate less than or equal to specified date
          schema: &ref_191
            type: string
            description: Expire date
          example: '2019-01-01'
        - name: expireDateMin
          in: query
          description: Filter expireDate greater than or equal to the specified date
          schema: &ref_192
            type: string
            description: Expire date
          example: '2019-01-01'
        - name: expireDays
          in: query
          description: Filter by expireDays less than or equal to the specified value
          schema: &ref_193
            type: string
            description: Expire days
          example: '20'
        - name: expireDaysMin
          in: query
          description: Filter by expireDays greater than or equal to the specified value
          schema: &ref_194
            type: string
            description: Expire days
          example: '20'
        - name: shutdownDate
          in: query
          description: Filter by shutdownDate less than equal to the specified date
          schema: &ref_195
            type: string
            description: Shutdown date
          example: '2019-01-01'
        - name: shutdownDateMin
          in: query
          description: Filter by shutdownDate greater than or equal to the specified date
          schema: &ref_196
            type: string
            description: Shutdown date
          example: '2019-01-01'
        - name: shutdownDays
          in: query
          description: Filter by shutdownDays less than or equal to the specified value
          schema: &ref_197
            type: string
            description: Shutdown days
          example: '20'
        - name: shutdownDaysMin
          in: query
          description: Filter by shutdownDays greater than or equal to the specified value
          schema: &ref_198
            type: string
            description: Shutdown days
          example: '20'
        - name: labels
          in: query
          description: Filter by label(s), matches records that contain any of the specified labels
          schema: *ref_11
        - name: allLabels
          in: query
          description: Filter by label(s), matches records that contain all of the specified labels
          schema: *ref_21
        - name: tags.name
