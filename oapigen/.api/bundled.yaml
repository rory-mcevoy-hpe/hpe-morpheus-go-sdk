    post:
      summary: Creates a Cloud
      description: |
        Creates a cloud.
      operationId: addClouds
      tags:
        - Clouds
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - zone
              properties:
                zone:
                  type: object
                  required: &ref_268
                    - name
                    - groupId
                    - zoneType
                    - config
                  properties: &ref_269
                    name:
                      type: string
                      description: A unique name scoped to your account for the cloud
                      example: My Cloud
                    groupId:
                      type: integer
                      format: int64
                      description: Specifies which Server group this cloud should be assigned to
                      example: 3
                    zoneType:
                      description: Map containing the Cloud (zone) type ID. See the zone-types API to fetch a list of all available Cloud (zone) types and their IDs.
                      anyOf:
                        - type: object
                          description: Map containing the Cloud (zone) type ID. See the zone-types API to fetch a list of all available Cloud (zone) types and their IDs.
                          properties:
                            id:
                              type: integer
                              format: int64
                              example: 12
                        - type: object
                          description: Map containing the Cloud (zone) code name. See the zone-types API to fetch a list of all available Cloud (zone) types and their codes.
                          properties:
                            code:
                              type: string
                              example: vmware
                    config:
                      type: object
                      description: Cloud configuration settings.
                      anyOf:
                        - description: Amazon Cloud
                          type: object
                          required: &ref_262
                            - endpoint
                          properties: &ref_263
                            applianceUrl:
                              type: string
                              description: The URL used by workloads provisioned in the cloud for interacting with the Morpheus appliance.
                            datacenterName:
                              type: string
                              description: A custom name used to reference the datacenter for the cloud.
                            externalId:
                              type:
                                - string
                                - 'null'
                              description: The external id of the cloud
                            inventoryLevel:
                              type: string
                              enum:
                                - 'off'
                                - basic
                                - full
                              description: Whether to import existing virtual machines.
                            consoleKeymap:
                              type: string
                              description: The keyboard layout to use for the console
                            endpoint:
                              type: string
                              description: AWS endpoint
                              example: ec2.ca-central-1.amazonaws.com
                            accessKey:
                              type: string
                              description: AWS access key
                            secretKey:
                              type: string
                              description: AWS secret key
                            useHostCredentials:
                              type: string
                              enum:
                                - 'on'
                                - 'off'
                              description: Whether to use the IAM profile associated with the Morpheus server or not
                              default: 'on'
                              example: 'on'
                            ebsEncryption:
                              type: string
                              enum:
                                - 'on'
                                - 'off'
                              description: Determines whether to configure default EBS volume encryption or not
                              default: 'on'
                              example: 'on'
                            stsAssumeRole:
                              type: string
                              description: The AWS IAM role ARN to assume for authentication
                            configManagementId:
                              type: string
                              description: The id of the configuration management integration associated with the AWS cloud
                            vpc:
                              type: string
                              description: The VPC ID for a specific VPC
                              example: vpc-25e6dae
                        - description: Azure Cloud
                          type: object
                          properties: &ref_264
                            applianceUrl:
                              type: string
                              description: The URL used by workloads provisioned in the cloud for interacting with the Morpheus appliance.
                            datacenterName:
                              type: string
                              description: A custom name used to reference the datacenter for the cloud.
                            externalId:
                              type:
                                - string
                                - 'null'
                              description: The external id of the cloud
                            inventoryLevel:
                              type: string
                              enum:
                                - 'off'
                                - basic
                                - full
                              description: Whether to import existing virtual machines.
                            consoleKeymap:
                              type: string
                              description: The keyboard layout to use for the console
                            subscriberId:
                              type: string
                              description: Azure subscriber id
                              example: 8d6b0be1b6a8
                            tenantId:
                              type: string
                              description: Azure tenant id
                              example: aa46b411cb55
                            clientId:
                              type: string
                              description: Azure client id
                              example: 477ae92bd8ad
                            clientSecret:
                              type: string
                              description: Azure client secret
                              example: '************'
                            resourceGroup:
                              type: string
                              description: Azure resource group
                              example: /subscriptions/8d6b0be1b6a8/resourceGroups/TestRG
                            rpcMode:
                              oneOf:
                                - type: string
                                  enum:
                                    - guestexec
                                    - rpc
                                - type: 'null'
                              description: The method for interacting with cloud workloads (guestexec (VMware Tools) or rpc (SSH/WinRM))
                        - description: HVM Cloud
                          type: object
                          properties: &ref_265
                            applianceUrl:
                              type: string
                              description: The URL used by workloads provisioned in the cloud for interacting with the Morpheus appliance.
                            datacenterName:
                              type: string
                              description: A custom name used to reference the datacenter for the cloud.
                            externalId:
                              type:
                                - string
                                - 'null'
                              description: The external id of the cloud
                            inventoryLevel:
                              type: string
                              enum:
                                - 'off'
                                - basic
                                - full
                              description: Whether to import existing virtual machines.
                            consoleKeymap:
                              type: string
                              description: The keyboard layout to use for the console
                            certificateProvider:
                              type: string
                              description: Certificate provider
                              default: internal
                            enableNetworkTypeSelection:
                              oneOf:
                                - type: string
                                  enum:
                                    - 'on'
                                - type: 'null'
                              default: null
                              description: Whether to enable the user to select the network type during provisioning.
                        - description: VSphere Cloud
                          type: object
                          required: &ref_266
                            - apiUrl
                            - apiVersion
                            - datacenter
                          properties: &ref_267
                            applianceUrl:
                              type: string
                              description: The URL used by workloads provisioned in the cloud for interacting with the Morpheus appliance.
                            datacenterName:
                              type: string
                              description: A custom name used to reference the datacenter for the cloud.
                            externalId:
                              type:
                                - string
                                - 'null'
                              description: The external id of the cloud
                            inventoryLevel:
                              type: string
                              enum:
                                - 'off'
                                - basic
                                - full
                              description: Whether to import existing virtual machines.
                            consoleKeymap:
                              type: string
                              description: The keyboard layout to use for the console
                            apiUrl:
                              type: string
                              description: The SDK URL of the vCenter server.
                              example: https://vcenter.morpheus.local/sdk
                            apiVersion:
                              type: string
                              description: The SDK version of the vCenter server.
                            datacenter:
                              type: string
                              description: The vSphere datacenter to add.
                            cluster:
                              type: string
                              description: The name of the vSphere cluster
                              default: all
                            configManagementId:
                              type: string
                              description: The id of the configuration management integration associated with the vSphere cloud.
                            resourcePool:
                              type: string
                              description: The name of the vSphere resource pool
                            rpcMode:
                              oneOf:
                                - type: string
                                  enum:
                                    - guestexec
                                    - rpc
                                - type: 'null'
                              description: The method for interacting with cloud workloads (guestexec (VMware Tools) or rpc (SSH/WinRM))
                            storageType:
                              type: string
                              default: thin
                              enum:
                                - thin
                                - thick
                                - thickEager
                              description: The default vSphere VMDK type for virtual machines
                            certificateProvider:
                              type: string
                              description: Certificate provider
                              default: internal
                            enableVnc:
                              oneOf:
                                - type: string
                                  enum:
                                    - 'on'
                                - type: 'null'
                              default: null
                              description: Enable VNC access to the console.
                            hideHostSelection:
                              oneOf:
                                - type: string
                                  enum:
                                    - 'on'
                                - type: 'null'
                              default: null
                              description: Whether to hide the ability to select the vSphere host from the user during provisioning.
                            enableDiskTypeSelection:
                              oneOf:
                                - type: string
                                  enum:
                                    - 'on'
                                - type: 'null'
                              default: null
                              description: Whether to enable the user to select the disk type during provisioning.
                            enableStorageTypeSelection:
                              oneOf:
                                - type: string
                                  enum:
                                    - 'on'
                                - type: 'null'
                              default: null
                              description: Whether to enable the user to select the storage type during provisioning.
                            enableNetworkTypeSelection:
                              oneOf:
                                - type: string
                                  enum:
                                    - 'on'
                                - type: 'null'
                              default: null
                              description: Whether to enable the user to select the network type during provisioning.
                            username:
                              type: string
                              description: Username.
                              example: jsmith
                            password:
                              type: string
                              format: password
                              description: Password to apply to the user
                              example: Passw0rd!
                        - title: Generic Cloud Configuration
                          type: object
                    agentMode:
                      type: string
                      default: cloudInit
                      enum:
                        - cloudInit
                        - ssh
                      description: The method used to install the Morpheus agent on virtual machines provisioned in the cloud (ssh, cloudInit).
                    description:
                      type: string
                      description: Optional description field if you want to put more info there
                    code:
                      type: string
                      description: Optional code for use with policies
                      example: mycloud
                    labels:
                      type: array
                      description: Array of label strings, can be used for filtering.
                      items:
                        type: string
                    location:
                      type:
                        - string
                        - 'null'
                      description: Optional location for your cloud
                      example: US East
                    visibility:
                      type: string
                      description: The visibility of the cloud (private or public)
                      enum:
                        - private
                        - public
                      default: private
                    accountId:
                      type: integer
                      format: int64
                      description: Specifies which Tenant this cloud should be assigned to
                      example: 1
                    enabled:
                      type: boolean
                      description: Can be used to disable the cloud
                      default: true
                    autoRecoverPowerState:
                      type: boolean
                      description: Automatically Power on VMs
                      default: false
                    scalePriority:
                      type: integer
                      format: int64
                      description: Scale Priority
                      default: 1
                    defaultDatastoreSyncActive:
                      type: boolean
                      description: Sets the default active state during discovery of new datastores.
                    defaultNetworkSyncActive:
                      type: boolean
                      description: Sets the default active state during discovery of new networks.
                    defaultFolderSyncActive:
                      type: boolean
                      description: Sets the default active state during discovery of new folders.
                    defaultSecurityGroupSyncActive:
                      type: boolean
                      description: Sets the default active state during discovery of new security groups.
                    defaultPoolSyncActive:
                      type: boolean
                      description: Sets the default active state during discovery of new resource pools.
                    defaultPlanSyncActive:
                      type: boolean
                      description: Sets the default active state during discovery of new plans.
                    linkedAccountId:
                      type: integer
                      format: int64
                      description: Linked Account ID (enter commercial ID to get costing for AWS Govcloud)
                    securityMode:
                      type: string
                      default: 'off'
                      enum:
                        - 'off'
                        - internal
                      description: host firewall. `off` or `internal`. a.k.a. "local firewall"
                    credential:
                      type: object
                      description: Map containing Credential ID. Setting `type` to `local` means use the values set in the local cloud config instead of associating a credential.
                      properties:
                        type:
                          type: string
                          default: local
                        id:
                          type: integer
