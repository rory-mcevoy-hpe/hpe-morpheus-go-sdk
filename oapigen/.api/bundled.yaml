paths:
  /api/monitoring/alerts/{id}:
    get:
      summary: Get a Specific Alert
      description: Get details about a specific monitoring alert.
      operationId: getAlerts
      tags:
        - Alerts
      parameters:
        - name: id
          in: path
          description: Morpheus ID of the Object being referenced
          required: true
          schema: &ref_0
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: Alert Object
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      alert:
                        type: object
                        properties: &ref_1
                          id:
                            type: integer
                            format: int64
                          name:
                            type: string
                          allApps:
                            type: boolean
                          allChecks:
                            type: boolean
                          allGroups:
                            type: boolean
                          active:
                            type: boolean
                          minSeverity:
                            type: string
                          minDuration:
                            type: integer
                            format: int64
                          dateCreated:
                            type: string
                            format: date-time
                          lastUpdated:
                            type: string
                            format: date-time
                          checks:
                            type:
                              - array
                              - 'null'
                            items:
                              type: integer
                          checkGroups:
                            type:
                              - array
                              - 'null'
                            items:
                              type: integer
                          apps:
                            type:
                              - array
                              - 'null'
                            items:
                              type: integer
                          contacts:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                  format: int64
                                name:
                                  type: string
                                method:
                                  type: string
                                notify:
                                  type: boolean
                                close:
                                  type: boolean
                  - type: object
                    properties:
                      checks:
                        type: array
                        items:
                          type: object
                          properties: &ref_245
                            id:
                              type: integer
                              format: int64
                            account:
                              type: object
                              properties:
                                id:
                                  type: integer
                                  format: int64
                            active:
                              type: boolean
                            apiKey:
                              type: string
                            availability:
                              type: number
                            checkAgent:
                              type:
                                - string
                                - 'null'
                            checkInterval:
                              type:
                                - integer
                                - 'null'
                              format: int64
                            checkSpec:
                              type:
                                - string
                                - 'null'
                            checkType:
                              type: object
                              properties:
                                id:
                                  type: integer
                                  format: int64
                                code:
                                  type: string
                                name:
                                  type: string
                                metricName:
                                  type: string
                            config:
                              anyOf:
                                - title: Web Get Config
                                  type: object
                                  required: &ref_233
                                    - webMethod
                                    - webUrl
                                  properties: &ref_234
                                    webMethod:
                                      type: string
                                      description: HTTP method to use for testing
                                      enum:
                                        - GET
                                        - POST
                                    webUrl:
                                      type: string
                                      description: Web URL you wish to use to run a check on
                                      example: https://google.com
                                    ignoreSSL:
                                      type: boolean
                                      description: Ignore SSL Errors
                                      example: true
                                      default: false
                                    checkUser:
                                      type: string
                                      description: If you want to use HTTP Basic Authentication, populate this field with the username
                                      example: basicUser
                                    checkPassword:
                                      type: string
                                      description: If you want to use HTTP basic Authentication, populate this field with the password
                                      example: basicPassword
                                    textCheckOn:
                                      type: string
                                      description: Set value to `on` if you want to turn on text matching
                                      example: 'on'
                                    webTextMatch:
                                      type: string
                                      description: Set the string you want to look for in the page source
                                      example: Login
                                    tunnelOn:
                                      type: string
                                      description: Set to on to turn on tunneling
                                      enum:
                                        - 'on'
                                        - 'off'
                                    sshHost:
                                      type: string
                                      description: Hostname or IP address of the proxy host
                                    sshPort:
                                      type: integer
                                      format: int64
                                      description: Port for SSH on the proxy host, defaults to 22
                                    sshUser:
                                      type: string
                                      description: SSH user on the proxy host to login as
                                    sshPassword:
                                      type: string
                                      description: Password for user, if not using key based authentication
                                - title: SQL Config
                                  type: object
                                  required: &ref_235
                                    - dbPort
                                    - dbName
                                    - dbUser
                                    - dbHost
                                    - dbQuery
                                    - dbPassword
                                  properties: &ref_236
                                    dbHost:
                                      type: string
                                      description: Hostname or IP address of the database
                                      example: db.example.org
                                    dbPort:
                                      type: string
                                      description: Database Port (defaults to default port of DB type selected)
                                      example: '3306'
                                    dbUser:
                                      type: string
                                      description: Database username
                                      example: basicUser
                                    dbPassword:
                                      type: string
                                      description: Database password, (all check data is encrypted inside the database)
                                      example: basicPassword
                                    dbPasswordHash:
                                      type: string
                                      description: Database password hash
                                      example: 61236d68c76405c9c7b40838a9c5d120c76e4b222222222221943c0f340f10
                                    dbName:
                                      type: string
                                      description: Database name you would like to connect to
                                      example: testDb
                                    dbQuery:
                                      type: string
                                      description: Query to test
                                      example: select 1
                                    checkOperator:
                                      type: string
                                      description: Can be set to `lt` (less than), `gt` (greater than), `equal` (Equal to) for comparison
                                      enum:
                                        - lt
                                        - gt
                                        - equal
                                    checkResult:
                                      type: number
                                      example: 3
                                    checkUser:
                                      type: string
                                    textCheckOn:
                                      type: string
                                    checkPassword:
                                      type: string
                                    webTextMatch:
                                      type: string
                                    checkPasswordHash:
                                      type: string
                                    tunnelOn:
                                      type: string
                                      description: Set to on to turn on tunneling
                                      enum:
                                        - 'on'
                                        - 'off'
                                      default: 'off'
                                    sshHost:
                                      type: string
                                      description: Hostname or IP address of the proxy host
                                    sshPort:
                                      type: integer
                                      format: int64
                                      description: Port for SSH on the proxy host, defaults to 22
                                    sshUser:
                                      type: string
                                      description: SSH user on the proxy host to login as
                                    sshPassword:
                                      type: string
                                      description: Password for user, if not using key based authentication
                                - title: Elastic Search Config
                                  type: object
                                  required: &ref_237
                                    - esHost
                                    - esPort
                                  properties: &ref_238
                                    esHost:
                                      type: string
                                      description: Hostname or IP address of the Elasticsearch server
                                      example: test.example.org
                                    esPort:
                                      type: string
                                      description: Port to connect to the HTTP service
                                      example: '9200'
                                    checkUser:
                                      type: string
                                    textCheckOn:
                                      type: string
                                    checkPassword:
                                      type: string
                                    webTextMatch:
                                      type: string
                                    checkPasswordHash:
                                      type: string
                                    tunnelOn:
                                      type: string
                                      description: Set to on to turn on tunneling
                                      enum:
                                        - 'on'
                                        - 'off'
                                      default: 'off'
                                    sshHost:
                                      type: string
                                      description: Hostname or IP address of the proxy host
                                    sshPort:
                                      type: integer
                                      format: int64
                                      description: Port for SSH on the proxy host, defaults to 22
                                    sshUser:
                                      type: string
                                      description: SSH user on the proxy host to login as
                                    sshPassword:
                                      type: string
                                      description: Password for user, if not using key based authentication
                                - title: Socket Config
                                  type: object
                                  required: &ref_239
                                    - port
                                    - host
                                    - send
                                    - responseMatch
                                  properties: &ref_240
                                    host:
                                      type: string
                                      description: Hostname or IP address of the socket server
                                      example: test.example.org
                                    port:
                                      type: string
                                      description: TCP port
                                      example: '3306'
                                    send:
                                      type: string
                                      description: Connection string you might want to send to the service
                                      example: blah
                                    responseMatch:
                                      type: string
                                      description: Response from the service to match against
                                      example: OK
                                    checkUser:
                                      type: string
                                    textCheckOn:
                                      type: string
                                    checkPassword:
                                      type: string
                                    webTextMatch:
                                      type: string
                                    checkPasswordHash:
                                      type: string
                                    tunnelOn:
                                      type: string
                                      description: Set to on to turn on tunneling
                                      enum:
                                        - 'on'
                                        - 'off'
                                      default: 'off'
                                    sshHost:
                                      type: string
                                      description: Hostname or IP address of the proxy host
                                    sshPort:
                                      type: integer
                                      format: int64
                                      description: Port for SSH on the proxy host, defaults to 22
                                    sshUser:
                                      type: string
                                      description: SSH user on the proxy host to login as
                                    sshPassword:
                                      type: string
                                      description: Password for user, if not using key based authentication
                                - title: Push Config
                                  type: object
                                  maxProperties: 0
                                - type: object
                                  required: &ref_241
                                    - containerName
                                  properties: &ref_242
                                    containerName:
                                      type: string
                                    externalId:
                                      type:
                                        - string
                                        - 'null'
                                    checkUser:
                                      type: string
                                    textCheckOn:
                                      type: string
                                    checkPassword:
                                      type: string
                                    webTextMatch:
                                      type: string
                                    checkPasswordHash:
                                      type: string
                                    tunnelOn:
                                      type: string
                                      description: Set to on to turn on tunneling
                                      enum:
                                        - 'on'
                                        - 'off'
                                      default: 'off'
                                    sshHost:
                                      type: string
                                      description: Hostname or IP address of the proxy host
                                    sshPort:
                                      type: integer
                                      format: int64
                                      description: Port for SSH on the proxy host, defaults to 22
                                    sshUser:
                                      type: string
                                      description: SSH user on the proxy host to login as
                                    sshPassword:
                                      type: string
                                      description: Password for user, if not using key based authentication
                                - title: SNMP Config
                                  type: object
                                  required: &ref_243
                                    - host
                                    - port
                                  properties: &ref_244
                                    host:
                                      type: string
                                      description: Hostname or IP address of the SNMP network entity
                                      example: test.example.org
                                    port:
                                      type: string
                                      description: Port to connect to the SNMP entity
                                      example: '161'
                                    oid:
                                      type: string
                                      description: Object ID to get from the network entity
                                      example: .1.3.6.1.2.1.1.5.0
                                    checkOperator:
                                      type: string
                                      description: Operator to use when comparing returned value with the expected check response value. One of 'lt', 'equal', or 'gt'.
                                    checkResponse:
                                      type: string
                                      description: Value to use with the check operator
                                    version:
                                      type: string
                                      description: SNMP Version 1/2c/3 of snmp get command
                                      enum:
                                        - '1'
                                        - 2c
                                        - '3'
                                    community:
                                      description: Community string acts as simple user or ID password (only valid for v1/2c)
                                      type: string
                                    username:
                                      type: string
                                      description: Username used with SNMPv3 auth/privacy protocol passwords
                                    securityLevel:
                                      type: string
                                      description: Level of security for authentication and privacty
                                      enum:
                                        - noAuthNoPriv
                                        - authNoPriv
                                        - authPriv
                                    auth:
                                      type: string
