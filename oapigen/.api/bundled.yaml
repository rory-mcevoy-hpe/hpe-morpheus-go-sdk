    post:
      summary: Create a Catalog Item Type
      description: Use this command to create a catalog item type.
      operationId: addCatalogItemType
      tags:
        - Catalog Items
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                catalogItemType:
                  oneOf:
                    - type: object
                      required: &ref_254
                        - config
                      properties: &ref_255
                        name:
                          type: string
                          description: Catalog Item Type name
                        code:
                          type:
                            - string
                            - 'null'
                          description: Useful shortcode for provisioning naming schemes and export reference.
                        category:
                          type:
                            - string
                            - 'null'
                          description: Catalog Item Type category
                        description:
                          type: string
                          description: Catalog Item Type description
                        labels:
                          type:
                            - array
                            - 'null'
                          description: Array of label strings, can be used for filtering.
                          items:
                            type: string
                        type:
                          type: string
                          description: Type, `instance`, `blueprint` or `workflow`. This determines whether an Instance or App will be provisioned. Instance types require a config and blueprint requires a blueprint and appSpec, while workflow types requires a workflow and context.
                          enum:
                            - instance
                        visibility:
                          type: string
                          description: Visibility - Set to public to allow all tenants
                          default: private
                        layoutCode:
                          type:
                            - string
                            - 'null'
                          description: Identifier primarily used for Plugin Catalog Item Types
                        iconPath:
                          type: string
                          description: Icon Path, relative location of an icon image, eg. /assets/containers-png/nginx.png.
                        enabled:
                          type: boolean
                          description: Can be used to enable / disable the catalog item type.
                          default: true
                        featured:
                          type: boolean
                          description: Can be used to feature the catalog item type.
                          default: false
                        allowQuantity:
                          description: Can users order more than one of this item at a time.
                          type: boolean
                          default: false
                        config:
                          type: object
                          required: &ref_252
                            - group
                            - cloud
                            - type
                            - name
                            - config
                            - volumes
                            - layout
                            - plan
                          properties: &ref_253
                            group:
                              type: object
                              required:
                                - id
                              properties:
                                id:
                                  oneOf:
                                    - type: string
                                      description: The Group ID to provision the instance into.
                                      example: '2'
                                    - type: integer
                                      format: int64
                                      description: The Group ID to provision the instance into.
                                      example: 2
                                name:
                                  type: string
                                  description: The group name
                            cloud:
                              type: object
                              required:
                                - id
                              properties:
                                id:
                                  oneOf:
                                    - type: string
                                      description: The Cloud ID to provision the instance onto.
                                      example: '6'
                                    - type: integer
                                      format: int64
                                      description: The Cloud ID to provision the instance onto.
                                      example: 6
                                name:
                                  type: string
                                  description: The cloud name
                            type:
                              type: string
                              description: The type of instance by code we want to fetch.
                              example: ubuntu
                            name:
                              type: string
                              description: Name of the instance to be created.
                              example: myinstance
                            config:
                              anyOf:
                                - title: Azure Instance Configuration
                                  type: object
                                  properties: &ref_46
                                    resourcePoolId:
                                      type: string
                                      description: id of the resource group to be used, can be prefixed with `pool-`. A resource pool group can be specified instead by prefixing its ID with `poolGroup-`.
                                    availabilityOptions:
                                      type: string
                                      description: Availability Options
                                      enum:
                                        - zone
                                        - set
                                    availabilitySet:
                                      type: string
                                      description: Availability Set
                                    availabilityZone:
                                      type: integer
                                      format: int64
                                      description: Availability Zone
                                    azurefloatingIp:
                                      type: string
                                      description: Assign Public IP
                                      enum:
                                        - 'on'
                                        - 'off'
                                    bootDiagnostics:
                                      type: string
                                      description: Boot Diagnostics
                                      enum:
                                        - enable
                                        - enable_custom_storage
                                    osGuestDiagnostics:
                                      type: string
                                      description: OS Guest Diagnostics
                                      enum:
                                        - 'on'
                                        - 'off'
                                    diagnosticsStorageAccount:
                                      type: string
                                      description: Diagnostics Storage Account
                                    createUser:
                                      type: boolean
                                      description: Create User
                                      default: true
                                - title: VMWare Instance Configuration
                                  type: object
                                  properties: &ref_47
                                    noAgent:
                                      type:
                                        - boolean
                                        - 'null'
                                      description: Skipping Agent installation will result in a lack of logging and guest operating system statistics. Automation scripts may also be adversely affected.
                                      default: false
                                    resourcePoolId:
                                      type: string
                                      description: id of the resource group to be used, can be prefixed with `pool-`. A resource pool group can be specified instead by prefixing its ID with `poolGroup-`.
                                    hostId:
                                      type: string
                                      description: Specific host to deploy to if so desired.
                                    smbiosAssetTag:
                                      type: string
                                      description: Sets the asset tag on the SMBIOS for use by the guest operating system. If left blank, the virtual machine name will be used.
                                    nestedVirtualization:
                                      type: string
                                      description: Enable Nested Virtualization
                                      default: 'off'
                                      enum:
                                        - 'on'
                                        - 'off'
                                    vmwareFolderId:
                                      type: string
                                      description: VMWare Folder External ID (as a String) or ID (as an Integer or String)
                                    createUser:
                                      type:
                                        - boolean
                                        - 'null'
                                      description: Create user
                                      default: false
                                    template:
                                      description: Image ID. This is the ID of a Virtual Image.
                                      type: integer
                                      format: int64
                                      example: 567
                                - title: Google Cloud Instance Configuration
                                  type: object
                                  properties: &ref_48
                                    noAgent:
                                      type:
                                        - boolean
                                        - 'null'
                                      description: Skipping Agent installation will result in a lack of logging and guest operating system statistics. Automation scripts may also be adversely affected.
                                      default: false
                                    googleZoneId:
                                      type: integer
                                      format: int64
                                      description: External ID of the Google zone to use for instance.
                                    externalIpType:
                                      type: integer
                                      format: int64
                                      description: External IP Type.  `-1` for ephemeral IP.
                                      example: -1
                                    networkTags:
                                      type: string
                                      description: Network Tags
                                    serviceAccount:
                                      type: string
                                      description: Service Account
                                    accessScope:
                                      type: string
                                      description: Access Scope
                                - title: Amazon Instance Configuration
                                  type: object
                                  properties: &ref_49
                                    noAgent:
                                      type:
                                        - boolean
                                        - 'null'
                                      description: Skipping Agent installation will result in a lack of logging and guest operating system statistics. Automation scripts may also be adversely affected.
                                      default: false
                                    isEC2:
                                      type: string
                                      description: Amazon Cloud Type
                                      default: 'false'
                                    availabilityId:
                                      type: string
                                      description: Amazon Zone
                                    securityId:
                                      type: string
                                      description: Security Group
                                    publicIpType:
                                      type: string
                                      description: Public IP
                                      example: elasticIp
                                    instanceProfile:
                                      type: string
                                      description: IAM Profile
                                    kmsKeyId:
                                      type: string
                                      description: KMS Key ID
                                - title: Generic Instance Configuration
                                  type: object
                            volumes:
                              type: array
                              description: The (optional) volumes parameter is for LV configuration, can create additional LVs at provision It should be passed as an array of
                              items:
                                type: object
                                properties: &ref_43
                                  id:
                                    type: integer
                                    format: int64
                                    description: The id for the LV configuration being created.
                                    example: 1
                                    default: -1
                                  rootVolume:
                                    type: boolean
                                    description: If set to false then a non-root LV will be created.
                                    default: true
                                  name:
                                    type: string
                                    description: Name/type of the LV being created.
                                    example: data
                                    default: root
                                  size:
                                    type: integer
                                    format: int64
                                    description: Size of the LV to be created in GBs.  Uses default from service plan.
                                    example: 5
                                  sizeId:
                                    type:
                                      - integer
                                      - 'null'
                                    format: int64
                                    description: Can be used to select pre-existing LV choices from Morpheus.
                                  storageType:
                                    type:
                                      - integer
                                      - 'null'
                                    format: int64
                                    description: Identifier for LV type
                                  datastoreId:
                                    anyOf:
                                      - type:
                                          - string
                                          - 'null'
                                      - type:
                                          - integer
                                          - 'null'
                                        format: int64
                                    description: The ID of the specific datastore. Auto selection can be specified as auto or autoCluster (for clusters).
                                  controllerMountPoint:
                                    type: string
                                    description: |-
                                      The controller mount point specification for this volume in the format: `"id:busNumber:typeId:unitNumber"`
                                      For new storage controllers the id is passed as -1, so an example value would be: `"-1:1:6:0"` which translates to id: -1 (new), busNumber: 1, storage controller type id: 6 (SCSI VMware Paravirtual), unit number: 0.
                                      The current list of storage controllers is returned for instances and servers for determining existing id values.
                                      Use `/api/provision-types?code=vmware` to see the available `controllerTypes` for vmware.
                            hostName:
                              type: string
                              description: Hostname of the instance to be created.  Can be the same as the instance name.
                              example: myinstance
                            environment:
                              type: string
                              description: Environment code
                            layout:
                              type: object
                              required:
                                - id
                              properties:
                                id:
                                  oneOf:
                                    - type: string
                                      description: The layout id for the instance type that you want to provision. i.e. single process or cluster
                                      example: '105'
                                    - type: integer
                                      format: int64
                                      description: The layout id for the instance type that you want to provision. i.e. single process or cluster
                                      example: 105
                            plan:
                              type: object
                              required:
                                - id
                              properties:
                                id:
                                  oneOf:
                                    - type: string
                                      description: The id for the memory and storage option pre-configured within Morpheus.
                                      example: '75'
                                    - type: integer
                                      format: int64
                                      description: The id for the memory and storage option pre-configured within Morpheus.
                                      example: 75
                            version:
                              type: string
                              description: Version of the layout to create.
                            evars:
                              type: array
                              description: Environment Variables, an array of objects that have name and value.
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                  value:
                                    type: string
                            servicePlanOptions:
                              type: object
